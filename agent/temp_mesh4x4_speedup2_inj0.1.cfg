// Normalized 4x4 Mesh Simulation
topology = mesh;
k = 4;
n = 2;

// Routing
routing_function = dor;

// Flow control
num_vcs     = 4;
vc_buf_size = 8;
wait_for_tail_credit = 1;

// Traffic
traffic = uniform;
packet_size = 5;
injection_rate = 0.1;
injection_process = bernoulli;

// Simulation
sim_type = latency;
max_samples = 10000;
print_csv_results = 1;

// Speedup settings for speedup=2
input_speedup = 2
output_speedup = 2
internal_speedup = 2.0