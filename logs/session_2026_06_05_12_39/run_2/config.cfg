// Topology
topology = mesh;
k = 3;
n = 2;

// Routing
routing_function = adaptive_xy_yx;

// Flow control
num_vcs     = 4;
vc_buf_size = 8;
wait_for_tail_credit = 1;

// Router architecture
vc_allocator = islip;
sw_allocator = islip;
alloc_iters  = 1;

credit_delay   = 2;
routing_delay  = 0;
vc_alloc_delay = 1;
sw_alloc_delay = 1;

input_speedup     = 2;
output_speedup    = 1;
internal_speedup  = 1.0;
noq=0;

// Traffic
traffic = uniform;
packet_size = {5,8};
injection_rate = 0.05;
injection_process = bernoulli;

// Simulation
sim_type = latency;
classes = 2;
print_csv_results = 0;
viewer_trace = 1;
network_file = network_file;
arb_type=priority;
speculative=0;
stats_out=stats.txt;
print_activity = 0;
seed=2;
