// 4x4 Mesh Simulation Configuration
topology = mesh;
k = 4;
n = 2;

// Routing
routing_function = dor;

// Flow control
num_vcs     = 2;
vc_buf_size = 8;
wait_for_tail_credit = 1;

// Traffic
traffic = asymmetric;
packet_size = 5;
injection_rate = 0.05;
injection_process = bernoulli;

// Simulation
sim_type = latency;
max_samples = 10000;
print_csv_results = 1;
noq = 0;
