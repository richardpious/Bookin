// 6x6 Torus configuration using XY (dimension-order) routing
topology = torus;
k = 6;
n = 2;

// Routing - XY routing is dimension-order routing in BookSim
routing_function = dim_order;

// Flow control
num_vcs = 2;
vc_buf_size = 4;
wait_for_tail_credit = 1;

// Traffic
traffic = uniform;
packet_size = 1;
injection_rate = 0.05;
injection_process = bernoulli;

// Simulation
sim_type = latency;
warmup_periods = 1000;
max_samples = 10000;
latency_thres = -1.0;
sim_count = 1;
seed = 2;
